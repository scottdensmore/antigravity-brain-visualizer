name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (JUnit + Spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # A PR's GITHUB_REF_NAME is "<pr>/merge"; the slash leaks into the project version and artifact
    # names. Pin a clean value for a tidy build.
    env:
      GITHUB_REF_NAME: ci
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build, format-check and test
        run: ./gradlew build --no-daemon

  frontend-unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The eval run history lives in Postgres, so the jar under test needs one. The credentials and
    # port match `docker-compose.yml`, which are also the app's built-in defaults — so the server
    # command needs no extra configuration. (The backend job needs no service: its repository tests
    # start their own container via Testcontainers.)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agentbrainviz
          POSTGRES_USER: agentviz
          POSTGRES_PASSWORD: agentviz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentviz -d agentbrainviz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the application jar
        # Override GITHUB_REF_NAME so the project version (and thus the jar filename) has no slash;
        # a PR ref like "1/merge" would otherwise nest the jar in a subdirectory.
        env:
          GITHUB_REF_NAME: e2e
        run: ./gradlew shadowJar -x test --no-daemon

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
