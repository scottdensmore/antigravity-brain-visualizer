name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (JUnit + Spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # A PR's GITHUB_REF_NAME is "<pr>/merge"; the slash leaks into the project version and artifact
    # names. Pin a clean value for a tidy build.
    env:
      GITHUB_REF_NAME: ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build, format-check and test
        run: ./gradlew build --no-daemon

  frontend-unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the application jar
        # Override GITHUB_REF_NAME so the project version (and thus the jar filename) has no slash;
        # a PR ref like "1/merge" would otherwise nest the jar in a subdirectory.
        env:
          GITHUB_REF_NAME: e2e
        run: ./gradlew shadowJar -x test --no-daemon

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
