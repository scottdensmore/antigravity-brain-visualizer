name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (JUnit + Spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # A PR's GITHUB_REF_NAME is "<pr>/merge"; the slash leaks into the project version and artifact
    # names. Pin a clean value for a tidy build.
    env:
      GITHUB_REF_NAME: ci
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build, format-check and test
        run: ./gradlew build --no-daemon

  frontend-unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          # The CLI depends only on the standard library, so there is no go.sum
          # to key a module cache on.
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { echo 'Run gofmt -w .'; gofmt -l .; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The eval run history lives in Postgres, so the jar under test needs one. The credentials and
    # port match `docker-compose.yml`, which are also the app's built-in defaults — so the server
    # command needs no extra configuration. (The backend job needs no service: its repository tests
    # start their own container via Testcontainers.)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agentbrainviz
          POSTGRES_USER: agentviz
          POSTGRES_PASSWORD: agentviz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentviz -d agentbrainviz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the application jar
        # Override GITHUB_REF_NAME so the project version (and thus the jar filename) has no slash;
        # a PR ref like "1/merge" would otherwise nest the jar in a subdirectory.
        env:
          GITHUB_REF_NAME: e2e
        run: ./gradlew shadowJar -x test --no-daemon

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  native:
    name: Native image (GraalVM smoke)
    runs-on: ubuntu-latest
    # Native compilation is slow; give it room.
    timeout-minutes: 45
    # The binary boots against a real store: this job exists to catch GraalVM reachability gaps in the
    # store path (Hikari, pgjdbc connect/SCRAM auth, jsonb round-trip) that unit tests on the JVM miss.
    # Credentials and port match docker-compose.yml, which are also the app's built-in defaults.
    env:
      GITHUB_REF_NAME: native
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agentbrainviz
          POSTGRES_USER: agentviz
          POSTGRES_PASSWORD: agentviz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentviz -d agentbrainviz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Compile the native image
        run: ./gradlew nativeCompile --no-daemon

      - name: Boot the binary and smoke-test the store path
        run: |
          set -euo pipefail

          ./build/native/nativeCompile/agy-brain-viz > native-app.log 2>&1 &
          APP_PID=$!
          trap 'echo "--- native app log ---"; cat native-app.log; kill "$APP_PID" 2>/dev/null || true' EXIT

          # Liveness needs no database, so it flips up as soon as the server is serving.
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then break; fi
            sleep 2
          done

          # Capture each response then grep a here-string (rather than curl | grep): it echoes the
          # body into the CI log for debugging and avoids a SIGPIPE false-failure under pipefail.
          cat > smoke-session.json <<'JSON'
          [{"source":"antigravity-cli","id":"native-smoke","sourceMtime":1700000000000,"raw":"{\"type\":\"USER_INPUT\",\"content\":\"hi\"}\n"}]
          JSON

          echo "Readiness (Hikari + pgjdbc connect/auth under native):"
          ready=$(curl -fsS http://localhost:8080/health/ready); echo "  $ready"
          grep -q '"db":"UP"' <<<"$ready"

          echo "Ingest one session (normalize + jsonb upsert):"
          ingest=$(curl -fsS -X POST http://localhost:8080/api/ingest/sessions \
            -H 'Content-Type: application/json' -d @smoke-session.json); echo "  $ingest"
          grep -q '"ingested":1' <<<"$ingest"

          echo "List it back (read query + summaries join):"
          list=$(curl -fsS "http://localhost:8080/api/brain/conversations?flavor=antigravity-cli"); echo "  $list"
          grep -q 'native-smoke' <<<"$list"

          echo "Read its transcript (stored steps):"
          transcript=$(curl -fsS "http://localhost:8080/api/brain/conversations/native-smoke/transcript?flavor=antigravity-cli"); echo "  $transcript"
          grep -q 'USER_INPUT' <<<"$transcript"

          # The native image bakes logback.xml at build time (replaceLogbackXml), so runtime log-format
          # switching is a JVM/Docker feature — but confirm the binary still logs at all (guards against
          # a bad appender wiring silently producing zero logs).
          echo "Native binary emits startup logs:"
          grep -q 'Startup completed' native-app.log

          echo "Native smoke test passed."
