name: Release CLI binaries

# Publishes cross-platform agent-ingest binaries and attaches them to the GitHub Release, stamped
# with the release tag so `agent-ingest --version` reports exactly which build is running. Mirrors
# release-native-binaries.yml (which ships the app's native binaries on the same trigger).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # Gate the release build on the CLI tests, so a tag cut from a red commit doesn't ship binaries.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          # Stdlib-only, so there's no go.sum for setup-go to key a module cache on.
          cache: false
      - run: go test ./...
        working-directory: cli

  build:
    name: agent-ingest ${{ matrix.os }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, os: linux }
          - { goos: linux, goarch: arm64, os: linux }
          - { goos: darwin, goarch: amd64, os: macos }
          - { goos: darwin, goarch: arm64, os: macos }
          - { goos: windows, goarch: amd64, os: windows, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track cli/go.mod so a future Go bump doesn't need a second edit here.
          go-version-file: cli/go.mod
          # Stdlib-only, so there's no go.sum for setup-go to key a module cache on.
          cache: false

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # A pure-Go, statically linked binary that runs anywhere for its platform.
          CGO_ENABLED: "0"
        run: |
          # macOS assets are labelled "macos" (matching release-native-binaries.yml), while GOOS stays
          # the Go value "darwin".
          out="agent-ingest-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.ext }}"
          # -trimpath drops local paths from the binary; -s -w strip debug info; -X stamps the version.
          go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o "$out" .
          echo "ARTIFACT=cli/$out" >> "$GITHUB_ENV"

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
