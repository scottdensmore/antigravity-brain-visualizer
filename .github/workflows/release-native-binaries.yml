name: Build and Publish Native Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: build/native/nativeCompile/agy-brain-viz
            asset_name: agy-brain-viz-linux-amd64
          - os: macos-latest
            artifact: build/native/nativeCompile/agy-brain-viz
            asset_name: agy-brain-viz-macos-arm64
          - os: windows-latest
            artifact: build\native\nativeCompile\agy-brain-viz.exe
            asset_name: agy-brain-viz-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Build Native Image (macOS/Linux)
        if: runner.os != 'Windows'
        run: ./gradlew nativeCompile

      - name: Build Native Image (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat nativeCompile

      - name: Rename Artifact (macOS/Linux)
        if: runner.os != 'Windows'
        run: mv ${{ matrix.artifact }} ${{ matrix.asset_name }}

      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path ${{ matrix.artifact }} -NewName ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
