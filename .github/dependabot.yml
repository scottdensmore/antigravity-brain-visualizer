# Weekly dependency-update PRs for every ecosystem in the repo: the frontend/e2e npm packages, the
# backend's Gradle dependencies, the agent-ingest Go module, and the actions the workflows pin.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
